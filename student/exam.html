<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam - IELTS Platform</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="exam-body">

    <!-- HEADER -->
    <header class="exam-header">
        <div class="exam-title" id="exam-title">Loading...</div>
        <div style="display:flex; align-items:center; gap:24px;">
            <div class="exam-timer" id="countdown">00:00:00</div>
            <button class="btn btn-secondary" id="dark-mode-toggle">Giao diện Tối</button>
            <button id="btn-submit-exam" class="btn btn-primary">Submit Test</button>
            <button class="btn btn-secondary" onclick="window.location.href='/index.html'">Exit</button>
        </div>
    </header>

    <!-- PROGRESS BAR -->
    <div class="progress-container">
        <div class="progress-fill" id="exam-progress"></div>
    </div>

    <div class="top-navigation-panel" id="top-navigator">
        </div>

    <main class="exam-layout">
        <div class="exam-split-container" style="display: flex; flex-direction: row; width: 100%; height: calc(100vh - 140px);">

            <div class="exam-left-pane" id="left-resize-wrapper" style="width: 50%; height: 100%;">
                <div class="pane-content-card" id="exam-material-pane" style="height: 100%; overflow-y: auto;"></div>
            </div>

            <div id="drag-resizer" class="resizer"></div>

            <div class="exam-right-pane" id="right-resize-wrapper" style="width: 50%; height: 100%;">
                <div class="pane-content-card" id="exam-questions-pane" style="height: 100%; overflow-y: auto; padding-right: 10px;"></div>
            </div>

        </div>
    </main>

    <!-- SCRIPTS -->
    <script src="/js/darkmode.js"></script>
    <script type="module" src="/js/examEngine.js"></script>

</body>
</html>
